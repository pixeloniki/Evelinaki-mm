<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μου λείπεις...</title>
    <style>
        /* Modern & elegant font stack */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #2c0a1f, #4a1b3d, #6b2d5e, #9b4f7f);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(44, 10, 31, 0.75) 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .frame-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            animation: floatFrame 8s ease-in-out infinite;
        }
        
        .frame {
            position: relative;
            padding: 18px;
            background: linear-gradient(145deg, #2c1a0f, #5c4033, #2c1a0f);
            border-radius: 20px;
            box-shadow: 
                0 0 45px rgba(245, 215, 110, 0.65),
                0 25px 55px -12px rgb(0 0 0 / 65%),
                inset 0 4px 20px rgba(255,255,255,0.25);
            border: 9px solid #f5d76e;
        }
        
        .photo-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .photo {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        
        .teddy {
            position: absolute;
            bottom: -48px;
            left: -72px;
            width: 165px;
            filter: drop-shadow(18px 22px 18px rgba(0,0,0,0.45));
            animation: teddyBreath 4.2s ease-in-out infinite;
            z-index: 20;
        }
        
        /* MODERN TYPOGRAPHY: Clean, warm, elegant script for the message */
        .message {
            text-align: center;
            font-family: 'Caveat', 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 9vw, 3.8rem);
            font-weight: 700;
            line-height: 1.1;
            margin-top: 15px;
            margin-left: 45px;           /* Same positioning */
            background: linear-gradient(135deg, #FFF5E1, #FFDAB9, #FFB7C5, #FFE4E1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 20px rgba(255, 140, 170, 0.8),
                0 0 40px rgba(255, 80, 120, 0.5);
            animation: pulseText 4s ease-in-out infinite;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        
        @keyframes floatFrame {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-18px) rotate(2deg); }
        }
        
        @keyframes teddyBreath {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.045) rotate(5deg); }
        }
        
        @keyframes pulseText {
            0%, 100% { opacity: 1; text-shadow: 0 0 20px rgba(255, 140, 170, 0.8), 0 0 40px rgba(255, 80, 120, 0.5); }
            50% { opacity: 0.95; text-shadow: 0 0 30px rgba(255, 180, 200, 1), 0 0 55px rgba(255, 105, 150, 0.8); }
        }
        
        /* Canvas Hearts */
        #heartsCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 4;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>

    <div class="container">
        <div class="frame-wrapper">
            <div class="frame">
                <div class="photo-container" style="aspect-ratio: 1 / 1.05;">
                    <img src="image.jpg" alt="Μας" class="photo" onerror="this.src='https://picsum.photos/id/1015/800/800';">
                </div>
            </div>
        </div>

        <!-- Teddy Bear -->
        <div class="teddy">
            <svg width="165" height="185" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="80" cy="125" rx="48" ry="52" fill="#8B5A2B"/>
                <circle cx="80" cy="68" r="38" fill="#8B5A2B"/>
                <circle cx="50" cy="42" r="18" fill="#8B5A2B"/>
                <circle cx="110" cy="42" r="18" fill="#8B5A2B"/>
                <circle cx="50" cy="42" r="10" fill="#A67B5B"/>
                <circle cx="110" cy="42" r="10" fill="#A67B5B"/>
                <ellipse cx="80" cy="72" rx="22" ry="18" fill="#A67B5B"/>
                <ellipse cx="80" cy="67" rx="10" ry="7" fill="#2C2C2C"/>
                <circle cx="65" cy="60" r="6" fill="#2C2C2C"/>
                <circle cx="95" cy="60" r="6" fill="#2C2C2C"/>
                <circle cx="67" cy="58" r="2" fill="#fff"/>
                <circle cx="97" cy="58" r="2" fill="#fff"/>
                <path d="M70 80 Q80 85 90 80" stroke="#2C2C2C" stroke-width="3" stroke-linecap="round"/>
                <ellipse cx="38" cy="125" rx="18" ry="32" fill="#8B5A2B" transform="rotate(-35 38 125)"/>
                <ellipse cx="122" cy="125" rx="18" ry="32" fill="#8B5A2B" transform="rotate(35 122 125)"/>
                <g transform="translate(115 105)">
                    <rect x="4" y="18" width="8" height="45" fill="#5C4033" rx="4"/>
                    <circle cx="8" cy="12" r="9" fill="#FF69B4"/>
                    <circle cx="0" cy="8" r="7" fill="#FF1493"/>
                    <circle cx="15" cy="7" r="8" fill="#FFB6C1"/>
                    <circle cx="8" cy="0" r="6" fill="#FF69B4"/>
                </g>
            </svg>
        </div>

        <div class="message">
            Μου λείπεις<br>πριγκίπισσα μου!!!
        </div>
    </div>

    <canvas id="heartsCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartsCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        let w, h;

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }

        class Heart {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w;
                this.y = Math.random() * h - h;
                this.size = Math.random() * 24 + 16;
                this.speed = Math.random() * 2.4 + 1.6;
                this.rotation = Math.random() * 360;
                this.rotSpeed = Math.random() * 5 - 2.5;
                this.opacity = Math.random() * 0.55 + 0.65;
            }
            update() {
                this.y += this.speed;
                this.rotation += this.rotSpeed;
                this.x += Math.sin(this.y / 70) * 1.1;
                if (this.y > h + 100) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.scale(this.size/30, this.size/30);
                
                ctx.fillStyle = '#ff69b4';
                ctx.shadowColor = '#ff1493';
                ctx.shadowBlur = 15;
                
                ctx.beginPath();
                ctx.moveTo(0,10);
                ctx.bezierCurveTo(-14,-8,-24,8,0,24);
                ctx.bezierCurveTo(24,8,14,-8,0,10);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, w, h);
            for (let heart of hearts) {
                heart.update();
                heart.draw();
            }
            requestAnimationFrame(animate);
        }

        // Init
        window.onload = () => {
            resize();
            hearts = Array.from({length: 70}, () => new Heart());
            animate();

            window.addEventListener('resize', resize);
        };
    </script>
</body>
</html>
