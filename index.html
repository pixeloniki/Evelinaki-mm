<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μου λείπεις...</title>
    <style>
        /* Modern & elegant font stack – same as updated */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Caveat:wght@400;500;600;700&family=Quicksand:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Montserrat', 'Quicksand', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #2c0a1f, #4a1b3d, #6b2d5e, #9b4f7f);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            will-change: background-position; /* performance hint */
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, transparent 40%, rgba(44, 10, 31, 0.75) 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .frame-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin-bottom: 20px;
            animation: floatFrame 8s ease-in-out infinite;
            will-change: transform;
        }
        
        /* lighter floating: only Y translation, no rotation for smoother perf */
        @keyframes floatFrame {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px); }
        }
        
        .frame {
            position: relative;
            padding: 18px;
            background: linear-gradient(145deg, #2c1a0f, #5c4033, #2c1a0f);
            border-radius: 20px;
            box-shadow: 
                0 0 45px rgba(245, 215, 110, 0.65),
                0 25px 55px -12px rgb(0 0 0 / 65%),
                inset 0 4px 20px rgba(255,255,255,0.25);
            border: 9px solid #f5d76e;
        }
        
        .photo-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }
        
        .photo {
            width: 100%;
            display: block;
            object-fit: cover;
        }
        
        .teddy {
            position: absolute;
            bottom: -48px;
            left: -72px;
            width: 165px;
            filter: drop-shadow(18px 22px 18px rgba(0,0,0,0.45));
            animation: teddyBreath 4.2s ease-in-out infinite;
            z-index: 20;
            will-change: transform;
        }
        
        @keyframes teddyBreath {
            0%, 100% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.045) rotate(5deg); }
        }
        
        /* MODERN TYPOGRAPHY - refined shadows for less lag (single soft shadow) */
        .message {
            text-align: center;
            font-family: 'Caveat', 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 9vw, 3.8rem);
            font-weight: 700;
            line-height: 1.1;
            margin-top: 15px;
            margin-left: 45px;
            background: linear-gradient(135deg, #FFF5E1, #FFDAB9, #FFB7C5, #FFE4E1);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 18px rgba(255, 100, 150, 0.7);
            animation: pulseText 4s ease-in-out infinite;
            letter-spacing: -0.5px;
        }
        
        @keyframes pulseText {
            0%, 100% { opacity: 1; text-shadow: 0 0 18px rgba(255, 100, 150, 0.7); }
            50% { opacity: 0.96; text-shadow: 0 0 28px rgba(255, 140, 180, 0.9); }
        }
        
        /* Canvas Hearts - optimized for smoothness */
        #heartsCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 4;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>

    <div class="container">
        <div class="frame-wrapper">
            <div class="frame">
                <div class="photo-container" style="aspect-ratio: 1 / 1.05;">
                    <img src="image.jpg" alt="Μας" class="photo" onerror="this.src='https://picsum.photos/id/1015/800/800';">
                </div>
            </div>
        </div>

        <!-- Teddy Bear (unchanged) -->
        <div class="teddy">
            <svg width="165" height="185" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="80" cy="125" rx="48" ry="52" fill="#8B5A2B"/>
                <circle cx="80" cy="68" r="38" fill="#8B5A2B"/>
                <circle cx="50" cy="42" r="18" fill="#8B5A2B"/>
                <circle cx="110" cy="42" r="18" fill="#8B5A2B"/>
                <circle cx="50" cy="42" r="10" fill="#A67B5B"/>
                <circle cx="110" cy="42" r="10" fill="#A67B5B"/>
                <ellipse cx="80" cy="72" rx="22" ry="18" fill="#A67B5B"/>
                <ellipse cx="80" cy="67" rx="10" ry="7" fill="#2C2C2C"/>
                <circle cx="65" cy="60" r="6" fill="#2C2C2C"/>
                <circle cx="95" cy="60" r="6" fill="#2C2C2C"/>
                <circle cx="67" cy="58" r="2" fill="#fff"/>
                <circle cx="97" cy="58" r="2" fill="#fff"/>
                <path d="M70 80 Q80 85 90 80" stroke="#2C2C2C" stroke-width="3" stroke-linecap="round"/>
                <ellipse cx="38" cy="125" rx="18" ry="32" fill="#8B5A2B" transform="rotate(-35 38 125)"/>
                <ellipse cx="122" cy="125" rx="18" ry="32" fill="#8B5A2B" transform="rotate(35 122 125)"/>
                <g transform="translate(115 105)">
                    <rect x="4" y="18" width="8" height="45" fill="#5C4033" rx="4"/>
                    <circle cx="8" cy="12" r="9" fill="#FF69B4"/>
                    <circle cx="0" cy="8" r="7" fill="#FF1493"/>
                    <circle cx="15" cy="7" r="8" fill="#FFB6C1"/>
                    <circle cx="8" cy="0" r="6" fill="#FF69B4"/>
                </g>
            </svg>
        </div>

        <div class="message">
            Μου λείπεις<br>πριγκίπισσα μου!!!
        </div>
    </div>

    <canvas id="heartsCanvas"></canvas>

    <script>
        (function() {
            const canvas = document.getElementById('heartsCanvas');
            const ctx = canvas.getContext('2d');
            let hearts = [];
            let w, h;
            let animationId = null;

            function resize() {
                w = window.innerWidth;
                h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
            }

            class Heart {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h - h;
                    this.size = Math.random() * 20 + 14;   // slightly smaller but still lovely
                    this.speed = Math.random() * 1.8 + 1.2; // smoother movement
                    this.rotation = Math.random() * 360;
                    this.rotSpeed = Math.random() * 3 - 1.5;
                    this.opacity = Math.random() * 0.5 + 0.5;
                }
                update() {
                    this.y += this.speed;
                    this.rotation += this.rotSpeed;
                    this.x += Math.sin(this.y / 70) * 0.8;
                    if (this.y > h + 100) this.reset();
                }
                draw() {
                    ctx.save();
                    ctx.globalAlpha = this.opacity;
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation * Math.PI / 180);
                    ctx.scale(this.size/30, this.size/30);
                    
                    // No shadowBlur for performance – clean fill
                    ctx.fillStyle = '#ff69b4';
                    ctx.beginPath();
                    ctx.moveTo(0,10);
                    ctx.bezierCurveTo(-14,-8,-24,8,0,24);
                    ctx.bezierCurveTo(24,8,14,-8,0,10);
                    ctx.fill();
                    ctx.restore();
                }
            }

            function initHearts() {
                hearts = [];
                const heartCount = 42; // balanced: plenty of hearts but no lag
                for (let i = 0; i < heartCount; i++) {
                    hearts.push(new Heart());
                }
            }

            function animate() {
                if (!ctx) return;
                ctx.clearRect(0, 0, w, h);
                for (let heart of hearts) {
                    heart.update();
                    heart.draw();
                }
                animationId = requestAnimationFrame(animate);
            }

            function start() {
                resize();
                initHearts();
                animate();
                window.addEventListener('resize', () => {
                    resize();
                    // reposition hearts after resize to avoid weird gaps
                    for (let heart of hearts) heart.reset();
                });
            }

            start();
        })();
    </script>
</body>
</html>
