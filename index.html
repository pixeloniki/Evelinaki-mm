
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Μου λείπεις...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap');
        
        :root {
            --gold: #f5d76e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Playfair Display', serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #2c0a1f, #4a1b3d, #6b2d5e, #9b4f7f);
            background-size: 400% 400%;
            animation: gradientShift 25s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            touch-action: manipulation;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 40%, rgba(44, 10, 31, 0.7) 100%);
            pointer-events: none;
            z-index: 1;
        }
        
        .bokeh {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 182, 193, 0.15) 0%, transparent 70%);
            animation: bokehFloat 30s linear infinite;
            pointer-events: none;
            z-index: 2;
            opacity: 0.6;
        }
        
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .frame-wrapper {
            position: relative;
            width: 100%;
            max-width: 320px;
            margin-bottom: 30px;
            animation: floatFrame 8s ease-in-out infinite;
        }
        
        .frame {
            position: relative;
            padding: 18px;
            background: linear-gradient(145deg, #2c1a0f, #5c4033, #2c1a0f);
            border-radius: 20px;
            box-shadow: 
                0 0 40px rgba(245, 215, 110, 0.6),
                0 25px 50px -12px rgb(0 0 0 / 60%),
                inset 0 4px 15px rgba(255,255,255,0.3),
                inset 0 -4px 15px rgba(0,0,0,0.6);
            border: 8px solid #f5d76e;
        }
        
        .frame::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, 
                rgba(255,255,255,0.25) 0%,
                rgba(255,255,255,0) 40%,
                rgba(255,255,255,0.15) 70%,
                rgba(255,255,255,0) 100%);
            border-radius: 12px;
            pointer-events: none;
            animation: glassShimmer 6s linear infinite;
        }
        
        .photo-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.5);
        }
        
        .photo {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        
        .frame:hover .photo {
            transform: scale(1.03);
        }
        
        .sparkles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        .teddy {
            position: absolute;
            bottom: -45px;
            left: -65px;
            width: 160px;
            filter: drop-shadow(15px 20px 15px rgba(0,0,0,0.4));
            animation: teddyBreath 4s ease-in-out infinite;
            z-index: 20;
        }
        
        .message {
            text-align: center;
            font-size: clamp(1.8rem, 7vw, 2.8rem);
            font-weight: 700;
            line-height: 1.1;
            margin-top: 20px;
            background: linear-gradient(90deg, #ff9a9e, #fad0c4, #fad0c4, #ff9a9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 30px rgba(255, 105, 180, 0.8),
                0 0 60px rgba(255, 20, 147, 0.5);
            animation: pulseText 3s ease-in-out infinite,
                       shimmerText 5s linear infinite;
            letter-spacing: -1px;
        }
        
        @keyframes floatFrame {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-18px) rotate(2deg); }
        }
        
        @keyframes teddyBreath {
            0%, 100% { transform: scale(1) rotate(-4deg); }
            50% { transform: scale(1.04) rotate(4deg); }
        }
        
        @keyframes glassShimmer {
            0% { transform: translateX(-150%); }
            100% { transform: translateX(300%); }
        }
        
        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.92; }
        }
        
        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 24px;
            opacity: 0.9;
            text-shadow: 
                0 0 8px #ff1493,
                0 0 20px #ff69b4;
            user-select: none;
            pointer-events: none;
            z-index: 5;
            animation: fallHeart linear forwards;
        }
        
        @keyframes fallHeart {
            to {
                transform: translateY(110vh) rotate(720deg);
            }
        }
        
        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 380px;
            height: 380px;
            background: radial-gradient(circle, rgba(255, 105, 180, 0.25) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 3;
            animation: glowPulse 8s ease-in-out infinite;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="vignette"></div>
    <div class="bokeh"></div>
    <div class="glow"></div>

    <div class="container">
        <!-- Frame -->
        <div class="frame-wrapper">
            <div class="frame">
                <div class="photo-container" style="aspect-ratio: 1 / 1.05;">
                    <img src="image.jpg" alt="Μας" class="photo" onerror="this.src='https://picsum.photos/id/1015/800/800';">
                </div>
                <!-- Sparkle container -->
                <div class="sparkles" id="sparkles"></div>
            </div>
        </div>

        <!-- Teddy Bear -->
        <div class="teddy">
            <svg width="160" height="180" viewBox="0 0 160 180" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Teddy body -->
                <ellipse cx="80" cy="125" rx="48" ry="52" fill="#8B5A2B"/>
                <!-- Head -->
                <circle cx="80" cy="68" r="38" fill="#8B5A2B"/>
                <!-- Ears -->
                <circle cx="50" cy="42" r="18" fill="#8B5A2B"/>
                <circle cx="110" cy="42" r="18" fill="#8B5A2B"/>
                <circle cx="50" cy="42" r="10" fill="#A67B5B"/>
                <circle cx="110" cy="42" r="10" fill="#A67B5B"/>
                <!-- Snout -->
                <ellipse cx="80" cy="72" rx="22" ry="18" fill="#A67B5B"/>
                <!-- Nose -->
                <ellipse cx="80" cy="67" rx="10" ry="7" fill="#2C2C2C"/>
                <!-- Eyes -->
                <circle cx="65" cy="60" r="6" fill="#2C2C2C"/>
                <circle cx="95" cy="60" r="6" fill="#2C2C2C"/>
                <circle cx="67" cy="58" r="2" fill="#fff"/>
                <circle cx="97" cy="58" r="2" fill="#fff"/>
                <!-- Mouth -->
                <path d="M70 80 Q80 85 90 80" stroke="#2C2C2C" stroke-width="3" stroke-linecap="round"/>
                
                <!-- Arms -->
                <ellipse cx="38" cy="125" rx="18" ry="32" fill="#8B5A2B" transform="rotate(-35 38 125)"/>
                <ellipse cx="122" cy="125" rx="18" ry="32" fill="#8B5A2B" transform="rotate(35 122 125)"/>
                
                <!-- Bouquet -->
                <g transform="translate(115 105)">
                    <rect x="4" y="18" width="8" height="45" fill="#5C4033" rx="4"/>
                    <!-- Flowers -->
                    <circle cx="8" cy="12" r="9" fill="#FF69B4"/>
                    <circle cx="0" cy="8" r="7" fill="#FF1493"/>
                    <circle cx="15" cy="7" r="8" fill="#FFB6C1"/>
                    <circle cx="8" cy="0" r="6" fill="#FF69B4"/>
                </g>
            </svg>
        </div>

        <!-- Message -->
        <div class="message">
            Μου λείπεις<br>πριγκίπισσα μου!!!
        </div>
    </div>

    <canvas id="heartsCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none;"></canvas>

    <script>
        // Heart rain using Canvas
        const canvas = document.getElementById('heartsCanvas');
        const ctx = canvas.getContext('2d');
        
        let hearts = [];
        let width, height;
        
        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        
        class Heart {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height - height;
                this.size = Math.random() * 22 + 14;
                this.speed = Math.random() * 2.2 + 1.4;
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 4 - 2;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.hueShift = Math.random() * 30 - 15;
                this.depth = Math.random();
            }
            
            update() {
                this.y += this.speed;
                this.rotation += this.rotationSpeed;
                
                // Gentle sway
                this.x += Math.sin(this.y / 80) * 0.8;
                
                if (this.y > height + 50) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity * (0.6 + this.depth * 0.4);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.scale(this.size / 30, this.size / 30);
                
                // Heart shape
                ctx.fillStyle = `hsl(330, 95%, 65%)`;
                ctx.shadowColor = `hsl(330, 100%, 75%)`;
                ctx.shadowBlur = 12;
                
                ctx.beginPath();
                ctx.moveTo(0, 10);
                ctx.bezierCurveTo(-12, -8, -22, 8, 0, 22);
                ctx.bezierCurveTo(22, 8, 12, -8, 0, 10);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function createHearts(count) {
            hearts = [];
            for (let i = 0; i < count; i++) {
                hearts.push(new Heart());
            }
        }
        
        function animateHearts() {
            ctx.clearRect(0, 0, width, height);
            
            for (let heart of hearts) {
                heart.update();
                heart.draw();
            }
            
            requestAnimationFrame(animateHearts);
        }
        
        // Sparkles
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.textContent = '✨';
            sparkle.style.position = 'absolute';
            sparkle.style.fontSize = Math.random() * 18 + 12 + 'px';
            sparkle.style.left = Math.random() * 100 + '%';
            sparkle.style.top = Math.random() * 100 + '%';
            sparkle.style.opacity = Math.random() * 0.7 + 0.4;
            sparkle.style.animation = `sparkleAnim ${Math.random() * 3 + 2}s linear infinite`;
            sparkle.style.pointerEvents = 'none';
            sparkle.style.zIndex = '10';
            document.getElementById('sparkles').appendChild(sparkle);
            
            setTimeout(() => sparkle.remove(), 6000);
        }
        
        // Add CSS for sparkle animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes sparkleAnim {
                0% { transform: scale(0.6) rotate(0deg); opacity: 0.3; }
                50% { transform: scale(1.3) rotate(180deg); }
                100% { transform: scale(0.6) rotate(360deg); opacity: 0.9; }
            }
        `;
        document.head.appendChild(style);
        
        // Initialize everything
        function init() {
            resizeCanvas();
            createHearts(65);
            animateHearts();
            
            // Continuous sparkles
            setInterval(() => {
                if (Math.random() > 0.4) createSparkle();
            }, 180);
            
            // Extra sparkles near frame
            setInterval(() => {
                const frameSparkle = document.createElement('div');
                frameSparkle.textContent = '💖';
                frameSparkle.style.position = 'absolute';
                frameSparkle.style.fontSize = '18px';
                frameSparkle.style.left = '50%';
                frameSparkle.style.top = '30%';
                frameSparkle.style.transform = `translate(-50%, -50%)`;
                frameSparkle.style.opacity = '0';
                frameSparkle.style.animation = 'sparkleAnim 2.5s forwards';
                document.querySelector('.frame').appendChild(frameSparkle);
                
                setTimeout(() => frameSparkle.remove(), 3000);
            }, 1200);
            
            // Touch feedback
            document.addEventListener('touchstart', (e) => {
                if (Math.random() > 0.7) {
                    for (let i = 0; i < 6; i++) {
                        setTimeout(() => createSparkle(), i * 60);
                    }
                }
            });
            
            // Keyboard support for fun
            document.addEventListener('keydown', (e) => {
                if (e.key === 'h' || e.key === 'H') {
                    for (let i = 0; i < 25; i++) {
                        setTimeout(() => {
                            const h = new Heart();
                            h.y = Math.random() * height * 0.4;
                            hearts.push(h);
                        }, i * 12);
                    }
                }
            });
            
            console.log('%c💖 Romantic page loaded successfully 💖', 'color:#ff69b4; font-family:monospace; font-size:13px');
        }
        
        window.onload = init;
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
    </script>
</body>
</html>
